{%- if values.enableConnectivityLink and values.authModel === "apikey" %}
apiVersion: devportal.kuadrant.io/v1alpha1
kind: APIProduct
metadata:
  name: ${{values.uniqueName}}-api
  namespace: ${{values.namespace}}
  labels:
    app: ${{values.vmName}}
    app.kubernetes.io/name: ${{values.vmName}}
    backstage.io/kubernetes-id: ${{values.uniqueName}}
spec:
  displayName: "${{values.vmName}} — VM API"
  description: |
    API expuesta desde la VM ${{values.vmName}} via Gateway API.
    Protegida con API Key (header X-API-Key o cookie).
    Genera tu API Key desde el Dev Portal.
  version: "v1"
  publishStatus: Published
  approvalMode: automatic
  tags:
    - vm
    - api-key
    - kuadrant
  contact:
    team: ${{values.owner}}
    email: "${{values.owner}}@redhat.local"
  documentation:
    gitRepository: "https://gitea-gitea.${{values.clusterDomain}}/ws-${{values.owner}}/${{values.vmName}}-vm"
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: ${{values.vmName}}-route
{%- endif %}
