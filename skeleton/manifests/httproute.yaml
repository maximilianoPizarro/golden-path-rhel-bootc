{%- if values.enableConnectivityLink %}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${{values.vmName}}-route
  namespace: ${{values.namespace}}
  labels:
    app: ${{values.vmName}}
    app.kubernetes.io/name: ${{values.vmName}}
    backstage.io/kubernetes-id: ${{values.uniqueName}}
spec:
  parentRefs:
    - name: ${{values.vmName}}-gateway
      namespace: ${{values.namespace}}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: ${{values.routePath}}
      backendRefs:
        - group: ""
          kind: Service
          name: ${{values.vmName}}
          port: 8080
          weight: 1
{%- endif %}
