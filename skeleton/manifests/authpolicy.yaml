{%- if values.enableConnectivityLink and values.authModel !== "none" %}
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: ${{values.vmName}}-auth
  namespace: ${{values.namespace}}
  labels:
    app: ${{values.vmName}}
    app.kubernetes.io/name: ${{values.vmName}}
    backstage.io/kubernetes-id: ${{values.uniqueName}}
{%- if values.authModel === "apikey" %}
    devportal.kuadrant.io/apiproduct: ${{values.uniqueName}}-api
{%- endif %}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: ${{values.vmName}}-route
  defaults:
    rules:
      authentication:
{%- if values.authModel === "apikey" %}
        api-key-header:
          apiKey:
            allNamespaces: true
            selector:
              matchLabels:
                authorino.kuadrant.io/managed-by: authorino
          credentials:
            customHeader:
              name: X-API-Key
          priority: 0
        api-key-cookie:
          apiKey:
            allNamespaces: true
            selector:
              matchLabels:
                authorino.kuadrant.io/managed-by: authorino
          credentials:
            cookie:
              name: vm-api-key
          priority: 1
{%- endif %}
{%- if values.authModel === "oidc" %}
        oidc:
          jwt:
            issuerUrl: https://rhbk.${{values.clusterDomain}}/realms/${{values.keycloakRealm}}
          credentials:
            authorizationHeader:
              prefix: Bearer
          priority: 1
{%- endif %}
{%- if values.authModel === "apikey" %}
      response:
        success: {}
        unauthenticated:
          code: 401
          headers:
            content-type:
              value: "text/html"
          body:
            value: '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>API Key Required</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:RedHatDisplay,RedHatText,Helvetica,Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#151515;color:#e0e0e0}.card{background:#292929;padding:2.5rem;border-radius:12px;text-align:center;max-width:420px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,.4)}.card h2{margin-bottom:.5rem;font-size:1.5rem;color:#fff}.card p{margin-bottom:1.5rem;font-size:.95rem;color:#a0a0a0}input{width:100%;padding:.75rem 1rem;background:#3c3f42;border:1px solid #6a6e73;color:#fff;border-radius:6px;font-size:1rem;outline:none;transition:border .2s}input:focus{border-color:#0066cc}button{margin-top:1rem;background:#ee0000;color:#fff;padding:.75rem 2rem;border:none;border-radius:6px;font-size:1rem;cursor:pointer;width:100%;transition:background .2s}button:hover{background:#c00}#logout{background:#6a6e73;margin-top:.5rem}#logout:hover{background:#555}.badge{display:inline-block;background:#0066cc;color:#fff;padding:.25rem .75rem;border-radius:12px;font-size:.8rem;margin-bottom:1rem}.err{color:#ee0000;margin-top:1rem;font-size:.9rem;display:none}</style></head><body><div class="card"><div class="badge">Kuadrant API Gateway</div><h2>API Key Required</h2><p>Enter your API key to access this service.</p><input type="password" id="key" placeholder="Enter API Key" onkeydown="if(event.key===''Enter'')doLogin()"><button onclick="doLogin()">Submit</button><button id="logout" onclick="document.cookie=''vm-api-key=;path=/;expires=Thu, 01 Jan 1970 00:00:00 GMT'';location.reload()">Clear Key</button><p class="err" id="err"></p></div><script>function doLogin(){var k=document.getElementById(''key'').value,e=document.getElementById(''err'');if(!k){e.textContent=''Please enter an API key'';e.style.display=''block'';return}e.style.display=''none'';fetch(window.location.href,{headers:{''X-API-Key'':k},redirect:''follow''}).then(function(r){if(r.ok){document.cookie=''vm-api-key=''+k+'';path=/;SameSite=Lax'';location.reload()}else{e.textContent=''Invalid API Key (HTTP ''+r.status+''). Please check your key and try again.'';e.style.display=''block''}}).catch(function(x){e.textContent=''Network error: ''+x.message;e.style.display=''block''})}</script></body></html>'
{%- endif %}
{%- endif %}
