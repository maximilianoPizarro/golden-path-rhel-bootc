apiVersion: v1
kind: Secret
metadata:
  name: ${{values.vmName}}-cloudinit
  namespace: ${{values.namespace}}
  labels:
    app: ${{values.vmName}}
type: Opaque
stringData:
  userdata: |
    #cloud-config
    hostname: ${{values.hostname}}
    user: cloud-user
    password: ${{values.vmPassword}}
    chpasswd:
      expire: false
    ssh_pwauth: true
    ssh_authorized_keys:
      - ${{values.sshPublicKey}}
    write_files:
{%- if values.installHttpd %}
      - path: /etc/yum.repos.d/centos-stream.repo
        permissions: "0644"
        content: |
          [centos-stream-baseos]
          name=CentOS Stream 9 - BaseOS
          baseurl=https://mirror.stream.centos.org/9-stream/BaseOS/x86_64/os/
          gpgcheck=0
          enabled=1

          [centos-stream-appstream]
          name=CentOS Stream 9 - AppStream
          baseurl=https://mirror.stream.centos.org/9-stream/AppStream/x86_64/os/
          gpgcheck=0
          enabled=1
      - path: /etc/httpd/conf.d/listen-8080.conf
        permissions: "0644"
        content: |
          Listen 8080
{%- endif %}
{%- if values.bootSource === "bootc-image" and values.bootcImageUrl %}
      - path: /etc/containers/systemd/bootc-update.timer
        permissions: "0644"
        content: |
          [Unit]
          Description=bootc automatic update timer

          [Timer]
          OnCalendar=daily
          Persistent=true

          [Install]
          WantedBy=timers.target
      - path: /etc/containers/systemd/bootc-update.service
        permissions: "0644"
        content: |
          [Unit]
          Description=bootc automatic update

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/bootc update --apply
          StandardOutput=journal
          StandardError=journal
{%- endif %}
    runcmd:
{%- if values.installHttpd %}
      - dnf install -y qemu-guest-agent httpd
      - sed -i 's/^Listen 80$//' /etc/httpd/conf/httpd.conf
      - rm -f /etc/httpd/conf.d/welcome.conf
      - mkdir -p /var/www/html
      - echo '<html><head><title>${{values.vmName}}</title><style>body{font-family:Red Hat Text,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#1a1a2e;color:#fff}div{text-align:center;background:#16213e;padding:48px;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.3)}h1{color:#e94560;margin:0 0 16px}p{color:#a8a8b3;margin:4px 0}code{background:#0f3460;padding:4px 12px;border-radius:6px;color:#e94560}</style></head><body><div><h1>${{values.vmName}}</h1><p>Red Hat Enterprise Linux VM</p><p>Managed by <strong>GitOps</strong> + <strong>OpenShift Virtualization</strong></p><p style="margin-top:16px"><code>${{values.namespace}}</code></p></div></body></html>' > /var/www/html/index.html
      - restorecon -Rv /var/www/html/
      - systemctl enable --now qemu-guest-agent
      - systemctl enable --now httpd
      - firewall-cmd --permanent --add-port=8080/tcp 2>/dev/null || true
      - firewall-cmd --reload 2>/dev/null || true
{%- else %}
      - systemctl enable --now qemu-guest-agent
{%- endif %}
{%- if values.extraPackages %}
      - dnf install -y ${{values.extraPackages}}
{%- endif %}
{%- if values.bootSource === "bootc-image" and values.bootcImageUrl %}
      - systemctl enable --now bootc-update.timer
{%- endif %}
{%- if values.cloudInitExtra %}
    ${{values.cloudInitExtra}}
{%- endif %}
