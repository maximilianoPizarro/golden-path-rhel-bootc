{%- if values.enableConnectivityLink %}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ${{values.vmName}}-route
  namespace: ${{values.namespace}}
  labels:
    app: ${{values.vmName}}
    app.kubernetes.io/name: ${{values.vmName}}
    backstage.io/kubernetes-id: ${{values.uniqueName}}
spec:
  to:
    kind: Service
    name: ${{values.vmName}}-gateway-istio
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{%- endif %}
