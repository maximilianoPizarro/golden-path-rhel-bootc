apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: rhel-vm-bootc
  title: "RHEL Virtual Machine (bootc / OpenShift Virtualization)"
  description: >
    Provisions a RHEL virtual machine on OpenShift Virtualization with
    configurable compute, storage, and networking. Supports bootc
    (image-mode RHEL) for GitOps-driven OS lifecycle management.
    Optionally exposes the VM through Connectivity Link (Gateway API +
    AuthPolicy + RateLimitPolicy). Creates a Gitea repo synced by ArgoCD.
  tags:
    - vm
    - rhel
    - bootc
    - openshift-virtualization
    - kubevirt
    - connectivity-link
    - gitops
    - recommended
spec:
  owner: platform-engineering
  type: vm

  parameters:
    # ── Page 1: VM Identity ──────────────────────────────────────
    - title: VM Identity
      required:
        - vmName
        - owner
      properties:
        vmName:
          title: VM Name
          type: string
          description: "DNS-compatible name for the virtual machine"
          pattern: "^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          default: "RHEL virtual machine managed via GitOps and bootc"
        owner:
          title: Owner (username)
          type: string
          description: "Your workshop username (e.g. user1)"
          default: ${{ user.entity.metadata.name }}
          pattern: "^user[0-9]+$"
        namespace:
          title: Target Namespace
          type: string
          description: "Kubernetes namespace for the VM resources"
          default: ""
          ui:help: "Leave empty to use <owner>-vms"

    # ── Page 2: Compute Resources ────────────────────────────────
    - title: Compute Resources
      properties:
        cpuCores:
          title: CPU Cores
          type: integer
          description: "Number of CPU cores per socket"
          default: 2
          enum: [1, 2, 4, 8, 16]
        cpuSockets:
          title: CPU Sockets
          type: integer
          description: "Number of CPU sockets"
          default: 1
          enum: [1, 2]
        cpuThreads:
          title: Threads per Core
          type: integer
          description: "Threads per CPU core"
          default: 1
          enum: [1, 2]
        memory:
          title: Memory
          type: string
          description: "Guest memory allocation"
          default: "4Gi"
          enum:
            - "2Gi"
            - "4Gi"
            - "8Gi"
            - "16Gi"
            - "32Gi"
          enumNames:
            - "2 GiB"
            - "4 GiB"
            - "8 GiB"
            - "16 GiB"
            - "32 GiB"
        runStrategy:
          title: Run Strategy
          type: string
          description: "VM lifecycle strategy"
          default: Always
          enum:
            - Always
            - RerunOnFailure
            - Manual
            - Halted
          enumNames:
            - "Always (auto-start and restart)"
            - "Rerun on Failure (restart only on crash)"
            - "Manual (start/stop manually)"
            - "Halted (create but do not start)"

    # ── Page 3: Storage & Boot Source ────────────────────────────
    - title: Storage & Boot Source
      required:
        - bootSource
      properties:
        rootDiskSize:
          title: Root Disk Size
          type: string
          description: "Size of the root disk PVC"
          default: "30Gi"
          enum:
            - "20Gi"
            - "30Gi"
            - "50Gi"
            - "100Gi"
            - "200Gi"
          enumNames:
            - "20 GiB"
            - "30 GiB"
            - "50 GiB"
            - "100 GiB"
            - "200 GiB"
        storageClass:
          title: Storage Class
          type: string
          description: "Kubernetes StorageClass name (leave empty for cluster default)"
          default: ""
        bootSource:
          title: Boot Source
          type: string
          description: "How the VM root disk is provisioned"
          default: registry
          enum:
            - registry
            - bootc-image
          enumNames:
            - "Container Registry (RHEL guest image)"
            - "bootc Image (image-mode RHEL)"
      dependencies:
        bootSource:
          oneOf:
            - properties:
                bootSource:
                  const: registry
                registryUrl:
                  title: Registry Image URL
                  type: string
                  description: "OCI image containing the guest disk (qcow2 or raw)"
                  default: "registry.redhat.io/rhel9/rhel-guest-image:latest"
            - properties:
                bootSource:
                  const: bootc-image
                bootcImageUrl:
                  title: bootc Container Image
                  type: string
                  description: "OCI bootc image for image-mode RHEL (e.g. quay.io/myorg/rhel-bootc:latest)"
                  default: "quay.io/centos-bootc/centos-bootc:stream9"

    # ── Page 4: Network & Access ─────────────────────────────────
    - title: Network & Access
      required:
        - sshPublicKey
        - vmPassword
      properties:
        vmPassword:
          title: VM Password
          type: string
          description: "Password for the cloud-user account (for console/VNC login)"
          default: "redhat123"
          ui:widget: password
        sshPublicKey:
          title: SSH Public Key
          type: string
          description: "SSH public key injected via cloud-init for the cloud-user account"
          ui:widget: textarea
          ui:options:
            rows: 3
        installHttpd:
          title: Install Apache HTTP Server
          type: boolean
          description: "Install and enable httpd with a default landing page"
          default: true
        extraPackages:
          title: Extra Packages
          type: string
          description: "Additional packages to install via cloud-init (space-separated)"
          default: ""
          ui:help: "E.g.: vim-enhanced git podman"
        hostname:
          title: Hostname
          type: string
          description: "Guest hostname (defaults to VM name)"
          default: ""
        cloudInitExtra:
          title: Extra cloud-init (advanced)
          type: string
          description: "Additional cloud-init user-data in YAML format (appended to the generated config)"
          default: ""
          ui:widget: textarea
          ui:options:
            rows: 5
        enableConnectivityLink:
          title: Expose via Connectivity Link
          type: boolean
          description: "Create Gateway, HTTPRoute, and policies to expose a VM service through the Istio mesh"
          default: false

    # ── Page 5: Connectivity Link ────────────────────────────────
    - title: Connectivity Link Configuration
      description: "Configure Gateway API routing and policies (only applies when 'Expose via Connectivity Link' is enabled)"
      properties:
        routePath:
          title: Route Path Prefix
          type: string
          description: "HTTP path prefix to match"
          default: "/"
        authModel:
          title: Authentication Model
          type: string
          description: "How clients authenticate to the exposed service"
          default: none
          enum:
            - none
            - oidc
            - apikey
          enumNames:
            - "None (open)"
            - "OIDC (Keycloak JWT)"
            - "API Key (X-API-Key header)"
        rateLimitPerMinute:
          title: Rate Limit (requests/minute)
          type: integer
          description: "Maximum requests per minute (0 = unlimited)"
          default: 120
      dependencies:
        authModel:
          oneOf:
            - properties:
                authModel:
                  const: none
            - properties:
                authModel:
                  const: apikey
            - properties:
                authModel:
                  const: oidc
                keycloakRealm:
                  title: Keycloak Realm
                  type: string
                  description: "Keycloak realm for JWT validation"
                  default: "neuralbank"
                keycloakClientId:
                  title: Keycloak Client ID
                  type: string
                  description: "OIDC client ID"
                  default: "vm-client"

  steps:
    - id: get-config
      name: Resolve Cluster Domain
      action: http:backstage:request
      input:
        method: GET
        path: /proxy/k8s-api/api/v1/namespaces/developer-hub/configmaps/workshop-config

    - id: fetch-skeleton
      name: Generate VM Manifests
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: .
        values:
          vmName: ${{ parameters.vmName }}
          uniqueName: "${{ parameters.owner }}-${{ parameters.vmName }}"
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          namespace: "${{ parameters.namespace if parameters.namespace else parameters.owner + '-vms' }}"
          cpuCores: ${{ parameters.cpuCores }}
          cpuSockets: ${{ parameters.cpuSockets }}
          cpuThreads: ${{ parameters.cpuThreads }}
          memory: ${{ parameters.memory }}
          runStrategy: ${{ parameters.runStrategy }}
          rootDiskSize: ${{ parameters.rootDiskSize }}
          storageClass: ${{ parameters.storageClass }}
          bootSource: ${{ parameters.bootSource }}
          registryUrl: ${{ parameters.registryUrl if parameters.registryUrl else "registry.redhat.io/rhel9/rhel-guest-image:latest" }}
          bootcImageUrl: ${{ parameters.bootcImageUrl if parameters.bootcImageUrl else "" }}
          sshPublicKey: ${{ parameters.sshPublicKey }}
          hostname: "${{ parameters.hostname if parameters.hostname else parameters.vmName }}"
          vmPassword: ${{ parameters.vmPassword }}
          installHttpd: ${{ parameters.installHttpd }}
          extraPackages: ${{ parameters.extraPackages }}
          cloudInitExtra: ${{ parameters.cloudInitExtra }}
          enableConnectivityLink: ${{ parameters.enableConnectivityLink }}
          routePath: ${{ parameters.routePath }}
          authModel: ${{ parameters.authModel }}
          rateLimitPerMinute: ${{ parameters.rateLimitPerMinute }}
          keycloakRealm: ${{ parameters.keycloakRealm if parameters.keycloakRealm else "neuralbank" }}
          keycloakClientId: ${{ parameters.keycloakClientId if parameters.keycloakClientId else "vm-client" }}
          clusterDomain: ${{ steps['get-config'].output.body.data.clusterDomain }}

    - id: publish
      name: Push to Gitea
      action: publish:gitea
      input:
        repoUrl: "gitea-gitea.${{ steps['get-config'].output.body.data.clusterDomain }}?owner=ws-${{ parameters.owner }}&repo=${{ parameters.vmName }}-vm"
        description: "RHEL VM: ${{ parameters.vmName }} — managed via GitOps + bootc"
        defaultBranch: main
        repoVisibility: public

    - id: register
      name: Register in Developer Hub Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /main/catalog-info.yaml

    - id: create-argocd-app
      name: Create ArgoCD Application
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/k8s-api/apis/argoproj.io/v1alpha1/namespaces/openshift-gitops/applications
        headers:
          Content-Type: application/json
        body:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: "${{ parameters.owner }}-${{ parameters.vmName }}-vm"
            namespace: openshift-gitops
            labels:
              demo.redhat.com/application: "field-content"
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: "${{ steps['publish'].output.remoteUrl }}"
              targetRevision: main
              path: manifests
            destination:
              server: https://kubernetes.default.svc
              namespace: "${{ parameters.namespace if parameters.namespace else parameters.owner + '-vms' }}"
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
                - SkipDryRunOnMissingResource=true

    - id: notify
      name: Send Notification
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/mailpit/api/v1/send
        headers:
          Content-Type: application/json
        body:
          From:
            Email: "developer-hub@redhat.local"
            Name: "Red Hat Developer Hub"
          To:
            - Email: "${{ parameters.owner }}@redhat.local"
              Name: "${{ parameters.owner }}"
          Subject: "VM Provisioned — ${{ parameters.vmName }}"
          Text: "Your RHEL virtual machine '${{ parameters.vmName }}' has been provisioned in namespace ${{ parameters.namespace if parameters.namespace else parameters.owner + '-vms' }}. Boot source: ${{ parameters.bootSource }}. ArgoCD will sync the resources automatically."
          HTML: "<div style='font-family:Red Hat Text,Helvetica,Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden'><div style='background:#0066CC;padding:24px 32px;text-align:center'><h1 style='color:#fff;margin:0;font-size:22px'>VM Provisioned</h1><p style='color:#d2d2d2;margin:4px 0 0;font-size:12px'>OpenShift Virtualization + bootc</p></div><div style='padding:32px'><h2 style='color:#151515;margin:0 0 16px;font-size:18px'>${{ parameters.vmName }}</h2><table style='width:100%;border-collapse:collapse;font-size:14px;margin-bottom:24px'><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73;width:160px'>Namespace</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.namespace if parameters.namespace else parameters.owner + '-vms' }}</td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73'>Compute</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.cpuCores }} cores / ${{ parameters.memory }}</td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73'>Root Disk</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.rootDiskSize }}</td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73'>Boot Source</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.bootSource }}</td></tr><tr><td style='padding:10px 0;color:#6a6e73'>Connectivity Link</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ 'Enabled' if parameters.enableConnectivityLink else 'Disabled' }}</td></tr></table></div><div style='background:#f0f0f0;padding:16px 32px;text-align:center;font-size:11px;color:#6a6e73'>Powered by Red Hat Developer Hub &bull; OpenShift Virtualization &bull; bootc</div></div>"

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
    text:
      - title: VM Provisioned
        content: |
          **${{ parameters.vmName }}** has been provisioned:
          - Namespace: `${{ parameters.namespace if parameters.namespace else parameters.owner + '-vms' }}`
          - Compute: ${{ parameters.cpuCores }} cores, ${{ parameters.memory }} RAM
          - Disk: ${{ parameters.rootDiskSize }} (${{ parameters.bootSource }})
          - Run strategy: `${{ parameters.runStrategy }}`
          - ArgoCD will sync the VM resources automatically
