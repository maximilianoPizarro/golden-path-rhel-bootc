{%- if values.enableConnectivityLink and values.rateLimitPerMinute > 0 and values.authModel !== "apikey" %}
apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  name: ${{values.vmName}}-ratelimit
  namespace: ${{values.namespace}}
  labels:
    app: ${{values.vmName}}
    app.kubernetes.io/name: ${{values.vmName}}
    backstage.io/kubernetes-id: ${{values.uniqueName}}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: ${{values.vmName}}-route
  limits:
    global:
      rates:
        - limit: ${{values.rateLimitPerMinute}}
          window: 1m
{%- endif %}
